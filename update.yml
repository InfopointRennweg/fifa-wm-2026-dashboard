name: Update FIFA WM Data

on:
  schedule:
    # Zeiten in UTC! (Schweiz ist UTC+2 im Sommer / MESZ)
    # 04:00 UTC = 06:00 MESZ
    # 06:30 UTC = 08:30 MESZ
    # 12:30 UTC = 14:30 MESZ
    # 16:30 UTC = 18:30 MESZ
    - cron: '0 4 * * *'
    - cron: '30 6 * * *'
    - cron: '30 12 * * *'
    - cron: '30 16 * * *'
  workflow_dispatch: # Erlaubt manuelles Starten über die GitHub Website

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    # Notwendig, damit der Bot ins Repo pushen darf
    permissions:
      contents: write

    steps:
    - name: Repo auschecken
      uses: actions/checkout@v3

    - name: Python einrichten
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Abhängigkeiten installieren
      run: pip install requests beautifulsoup4

    - name: Scraper ausführen
      run: python scraper.py

    - name: Neue Daten committen und pushen
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add data.js
        git commit -m "Automatisches Update der FIFA WM Daten" || exit 0
        git push
